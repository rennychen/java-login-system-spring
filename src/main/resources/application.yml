jwt:
  header: Authorization
  prefix: Bearer

spring:
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms
  profiles:
    active: prod
  datasource:
    url: jdbc:mysql://localhost:3306/login_system_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
